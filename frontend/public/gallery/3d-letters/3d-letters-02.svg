<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0a18"/>
      <stop offset="100%" stop-color="#181026"/>
    </linearGradient>
    <linearGradient id="blockFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="blockTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="blockSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
  </defs>
  <rect width="800" height="550" fill="url(#bg12)"/>
  <!-- Ambient -->
  <ellipse cx="400" cy="320" rx="340" ry="120" fill="#7c3aed" opacity="0.06"/>
  <!-- Block letters arranged left to right, each with 3D isometric style -->
  <!-- Letter block 1 (S) -->
  <!-- Side face -->
  <polygon points="118,390 148,360 148,160 118,190" fill="url(#blockSide)"/>
  <!-- Top face -->
  <polygon points="118,190 148,160 288,160 258,190" fill="url(#blockTop)"/>
  <!-- Front face -->
  <rect x="118" y="190" width="140" height="200" fill="url(#blockFace)"/>
  <!-- S text on block -->
  <text x="188" y="316" font-family="Georgia,serif" font-size="140" fill="#1e1040" text-anchor="middle" font-weight="bold" opacity="0.8">S</text>
  <!-- Letter block 2 (H) -->
  <!-- Side face -->
  <polygon points="298,390 328,360 328,160 298,190" fill="url(#blockSide)"/>
  <!-- Top face -->
  <polygon points="298,190 328,160 468,160 438,190" fill="url(#blockTop)"/>
  <!-- Front face -->
  <rect x="298" y="190" width="140" height="200" fill="url(#blockFace)" opacity="0.92"/>
  <text x="368" y="316" font-family="Georgia,serif" font-size="140" fill="#1e1040" text-anchor="middle" font-weight="bold" opacity="0.8">H</text>
  <!-- Letter block 3 (A) -->
  <!-- Side face -->
  <polygon points="478,390 508,360 508,160 478,190" fill="url(#blockSide)"/>
  <!-- Top face -->
  <polygon points="478,190 508,160 648,160 618,190" fill="url(#blockTop)"/>
  <!-- Front face -->
  <rect x="478" y="190" width="140" height="200" fill="url(#blockFace)" opacity="0.88"/>
  <text x="548" y="316" font-family="Georgia,serif" font-size="140" fill="#1e1040" text-anchor="middle" font-weight="bold" opacity="0.8">A</text>
  <!-- Ground shadow -->
  <ellipse cx="188" cy="405" rx="80" ry="10" fill="#4c1d95" opacity="0.2"/>
  <ellipse cx="368" cy="405" rx="80" ry="10" fill="#4c1d95" opacity="0.2"/>
  <ellipse cx="548" cy="405" rx="80" ry="10" fill="#4c1d95" opacity="0.2"/>
  <!-- Wall mounting line -->
  <line x1="90" y1="160" x2="670" y2="160" stroke="#a78bfa" stroke-width="1" opacity="0.3" stroke-dasharray="6,4"/>
  <text x="700" y="165" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa" opacity="0.5">WALL</text>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#0e0a18" opacity="0.97"/>
  <rect x="0" y="490" width="800" height="1" fill="#a78bfa" opacity="0.5"/>
  <text x="40" y="527" font-family="Arial,sans-serif" font-size="16" fill="#c4b5fd" font-weight="600" letter-spacing="2">3D LETTER BLOCKS</text>
  <rect x="680" y="507" width="80" height="24" rx="3" fill="#a78bfa" opacity="0.12"/>
  <text x="720" y="524" font-family="Arial,sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="600">SAMPLE</text>
</svg>
