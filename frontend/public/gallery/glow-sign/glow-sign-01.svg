<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120a1c"/>
      <stop offset="100%" stop-color="#1c0f2e"/>
    </linearGradient>
    <radialGradient id="bloomCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#d946ef" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a21caf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowF">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="glowMd">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="800" height="550" fill="url(#bg7)"/>
  <!-- Wide bloom glow background -->
  <ellipse cx="400" cy="265" rx="360" ry="240" fill="url(#bloomOuter)"/>
  <!-- Bloom center -->
  <ellipse cx="400" cy="265" rx="240" ry="160" fill="url(#bloomCenter)"/>
  <!-- Sign box 3D depth -->
  <polygon points="660,115 690,85 690,365 660,335" fill="#0c0620" opacity="0.9"/>
  <polygon points="110,335 660,335 690,365 140,365" fill="#0a0518" opacity="0.8"/>
  <!-- Sign box face -->
  <rect x="110" y="115" width="550" height="220" rx="4" fill="#1a0a2e"/>
  <rect x="110" y="115" width="550" height="220" rx="4" fill="none" stroke="#e879f9" stroke-width="2" opacity="0.8" filter="url(#glowMd)"/>
  <!-- Inner glow on box face -->
  <rect x="110" y="115" width="550" height="220" rx="4" fill="none" stroke="#e879f9" stroke-width="6" opacity="0.3" filter="url(#glowF)"/>
  <!-- Glow text -->
  <text x="384" y="250" font-family="Arial,sans-serif" font-size="56" fill="#f0abfc" text-anchor="middle" font-weight="700" letter-spacing="2" filter="url(#glowF)" opacity="0.5">SHREEJI ART</text>
  <text x="385" y="250" font-family="Arial,sans-serif" font-size="56" fill="#f0abfc" text-anchor="middle" font-weight="700" letter-spacing="2" filter="url(#glowMd)" opacity="0.7">SHREEJI ART</text>
  <text x="385" y="250" font-family="Arial,sans-serif" font-size="56" fill="#fae8ff" text-anchor="middle" font-weight="700" letter-spacing="2">SHREEJI ART</text>
  <!-- Subtitle -->
  <text x="385" y="296" font-family="Arial,sans-serif" font-size="15" fill="#d946ef" text-anchor="middle" letter-spacing="5" filter="url(#glowMd)" opacity="0.7">GLOW SIGN BOARD</text>
  <text x="385" y="296" font-family="Arial,sans-serif" font-size="15" fill="#e879f9" text-anchor="middle" letter-spacing="5">GLOW SIGN BOARD</text>
  <!-- Mounting brackets -->
  <rect x="85" y="190" width="28" height="60" rx="3" fill="#2d1b4e" stroke="#7c3aed" stroke-width="1"/>
  <rect x="687" y="190" width="28" height="60" rx="3" fill="#2d1b4e" stroke="#7c3aed" stroke-width="1"/>
  <!-- Ground glow reflection -->
  <ellipse cx="400" cy="420" rx="260" ry="30" fill="#e879f9" opacity="0.04"/>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#120a1c" opacity="0.97"/>
  <rect x="0" y="490" width="800" height="1" fill="#e879f9" opacity="0.5"/>
  <text x="40" y="527" font-family="Arial,sans-serif" font-size="16" fill="#f0abfc" font-weight="600" letter-spacing="2">GLOW SIGN BOARD</text>
  <rect x="680" y="507" width="80" height="24" rx="3" fill="#e879f9" opacity="0.12"/>
  <text x="720" y="524" font-family="Arial,sans-serif" font-size="12" fill="#e879f9" text-anchor="middle" font-weight="600">SAMPLE</text>
</svg>
