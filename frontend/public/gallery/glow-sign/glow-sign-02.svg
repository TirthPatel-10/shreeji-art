<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0818"/>
      <stop offset="100%" stop-color="#18082a"/>
    </linearGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#a21caf" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a21caf" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowCir">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="glowThin">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="800" height="550" fill="url(#bg8)"/>
  <!-- Outer bloom -->
  <circle cx="400" cy="260" r="260" fill="url(#circleGlow)"/>
  <!-- Outer glow ring 3 (faintest) -->
  <circle cx="400" cy="260" r="220" fill="none" stroke="#e879f9" stroke-width="3" opacity="0.12" filter="url(#glowCir)"/>
  <!-- Glow ring 2 -->
  <circle cx="400" cy="260" r="190" fill="none" stroke="#e879f9" stroke-width="5" opacity="0.22" filter="url(#glowCir)"/>
  <!-- Glow ring 1 (brightest outer) -->
  <circle cx="400" cy="260" r="160" fill="none" stroke="#e879f9" stroke-width="8" opacity="0.4" filter="url(#glowCir)"/>
  <!-- Sign circle face -->
  <circle cx="400" cy="260" r="145" fill="#1a0b2e"/>
  <circle cx="400" cy="260" r="145" fill="none" stroke="#e879f9" stroke-width="3" opacity="0.9" filter="url(#glowThin)"/>
  <circle cx="400" cy="260" r="145" fill="none" stroke="#fae8ff" stroke-width="1.5"/>
  <!-- Inner border ring -->
  <circle cx="400" cy="260" r="130" fill="none" stroke="#d946ef" stroke-width="1" opacity="0.4"/>
  <!-- Light reflection arc -->
  <path d="M 290 175 A 145 145 0 0 1 510 175" fill="none" stroke="#fae8ff" stroke-width="2" opacity="0.1"/>
  <!-- Glow text centered in circle -->
  <text x="400" y="252" font-family="Arial,sans-serif" font-size="36" fill="#fae8ff" text-anchor="middle" font-weight="700" letter-spacing="2" filter="url(#glowThin)" opacity="0.6">SHREEJI</text>
  <text x="400" y="252" font-family="Arial,sans-serif" font-size="36" fill="#fae8ff" text-anchor="middle" font-weight="700" letter-spacing="2">SHREEJI</text>
  <text x="400" y="291" font-family="Arial,sans-serif" font-size="36" fill="#fae8ff" text-anchor="middle" font-weight="700" letter-spacing="2" filter="url(#glowThin)" opacity="0.6">ART</text>
  <text x="400" y="291" font-family="Arial,sans-serif" font-size="36" fill="#fae8ff" text-anchor="middle" font-weight="700" letter-spacing="2">ART</text>
  <!-- Divider line in circle -->
  <line x1="310" y1="268" x2="490" y2="268" stroke="#e879f9" stroke-width="1" opacity="0.4"/>
  <!-- Ground reflection -->
  <ellipse cx="400" cy="430" rx="160" ry="18" fill="#e879f9" opacity="0.05"/>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#0e0818" opacity="0.97"/>
  <rect x="0" y="490" width="800" height="1" fill="#e879f9" opacity="0.5"/>
  <text x="40" y="527" font-family="Arial,sans-serif" font-size="16" fill="#f0abfc" font-weight="600" letter-spacing="2">CIRCULAR GLOW SIGN</text>
  <rect x="680" y="507" width="80" height="24" rx="3" fill="#e879f9" opacity="0.12"/>
  <text x="720" y="524" font-family="Arial,sans-serif" font-size="12" fill="#e879f9" text-anchor="middle" font-weight="600">SAMPLE</text>
</svg>
