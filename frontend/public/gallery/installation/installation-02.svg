<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bg24" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c18"/>
      <stop offset="100%" stop-color="#0c1830"/>
    </linearGradient>
    <linearGradient id="sky24" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f2848" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#060c18" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="crane24" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="sign24" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow24">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="800" height="550" fill="url(#bg24)"/>
  <!-- Sky gradient -->
  <rect x="0" y="0" width="800" height="400" fill="url(#sky24)"/>
  <!-- Building facade (right side) -->
  <rect x="480" y="0" width="320" height="490" fill="#0a1020" opacity="0.9"/>
  <g opacity="0.08" stroke="#3b82f6" stroke-width="0.5">
    <line x1="480" y1="80" x2="800" y2="80"/><line x1="480" y1="160" x2="800" y2="160"/>
    <line x1="480" y1="240" x2="800" y2="240"/><line x1="480" y1="320" x2="800" y2="320"/>
    <line x1="480" y1="400" x2="800" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="490"/><line x1="640" y1="0" x2="640" y2="490"/>
    <line x1="720" y1="0" x2="720" y2="490"/>
  </g>
  <!-- Building windows -->
  <g fill="#3b82f6" opacity="0.08">
    <rect x="500" y="100" width="50" height="60" rx="2"/><rect x="570" y="100" width="50" height="60" rx="2"/>
    <rect x="640" y="100" width="50" height="60" rx="2"/><rect x="710" y="100" width="70" height="60" rx="2"/>
    <rect x="500" y="180" width="50" height="60" rx="2"/><rect x="570" y="180" width="50" height="60" rx="2"/>
    <rect x="640" y="180" width="50" height="60" rx="2"/><rect x="710" y="180" width="70" height="60" rx="2"/>
  </g>
  <!-- Crane base / tower -->
  <rect x="80" y="200" width="40" height="290" rx="4" fill="url(#crane24)"/>
  <rect x="80" y="200" width="8" height="290" fill="#fcd34d" opacity="0.3"/>
  <!-- Crane mast (vertical) -->
  <rect x="96" y="60" width="12" height="160" rx="2" fill="url(#crane24)"/>
  <!-- Crane jib (horizontal arm) -->
  <rect x="96" y="60" width="380" height="14" rx="3" fill="url(#crane24)"/>
  <!-- Counter jib (rear) -->
  <rect x="36" y="60" width="64" height="10" rx="2" fill="#d97706"/>
  <!-- Counterweight -->
  <rect x="20" y="56" width="30" height="22" rx="2" fill="#92400e"/>
  <!-- Cable from crane hook -->
  <line x1="320" y1="74" x2="320" y2="220" stroke="#94a3b8" stroke-width="2"/>
  <line x1="320" y1="74" x2="300" y2="220" stroke="#94a3b8" stroke-width="2"/>
  <line x1="320" y1="74" x2="340" y2="220" stroke="#94a3b8" stroke-width="2"/>
  <!-- Hook -->
  <circle cx="320" cy="228" r="10" fill="none" stroke="#6b7280" stroke-width="3"/>
  <!-- Rigging chains to sign -->
  <line x1="318" y1="234" x2="290" y2="280" stroke="#6b7280" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="322" y1="234" x2="410" y2="280" stroke="#6b7280" stroke-width="2" stroke-dasharray="3,2"/>
  <!-- Sign being lifted/installed -->
  <rect x="280" y="280" width="240" height="120" rx="4" fill="url(#sign24)" stroke="#3b82f6" stroke-width="2" filter="url(#glow24)" opacity="0.3"/>
  <rect x="280" y="280" width="240" height="120" rx="4" fill="url(#sign24)" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="338" font-family="Arial,sans-serif" font-size="30" fill="#60a5fa" text-anchor="middle" font-weight="700" letter-spacing="3">SA</text>
  <text x="400" y="372" font-family="Arial,sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle" letter-spacing="3">INSTALLATION</text>
  <!-- Workers on lift platform (suggestion) -->
  <rect x="200" y="350" width="80" height="100" rx="3" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
  <!-- Worker silhouettes (simplified circles/rects) -->
  <circle cx="225" cy="370" r="10" fill="#475569"/>
  <rect x="218" y="380" width="14" height="30" rx="2" fill="#334155"/>
  <circle cx="255" cy="368" r="10" fill="#475569"/>
  <rect x="248" y="378" width="14" height="32" rx="2" fill="#334155"/>
  <!-- Scissor lift legs -->
  <line x1="208" y1="450" x2="220" y2="430" stroke="#374151" stroke-width="3"/>
  <line x1="272" y1="450" x2="260" y2="430" stroke="#374151" stroke-width="3"/>
  <!-- Ground shadow -->
  <ellipse cx="400" cy="490" rx="320" ry="18" fill="#3b82f6" opacity="0.04"/>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#060c18" opacity="0.97"/>
  <rect x="0" y="490" width="800" height="1" fill="#3b82f6" opacity="0.5"/>
  <text x="40" y="527" font-family="Arial,sans-serif" font-size="16" fill="#93c5fd" font-weight="600" letter-spacing="2">ON-SITE SIGN INSTALLATION</text>
  <rect x="680" y="507" width="80" height="24" rx="3" fill="#3b82f6" opacity="0.12"/>
  <text x="720" y="524" font-family="Arial,sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="600">SAMPLE</text>
</svg>
