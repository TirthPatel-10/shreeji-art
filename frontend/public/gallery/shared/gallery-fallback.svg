<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bgFb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c2e"/>
      <stop offset="100%" stop-color="#2a2a3e"/>
    </linearGradient>
    <linearGradient id="iconFb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4b5563"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
  </defs>
  <rect width="800" height="550" fill="url(#bgFb)"/>
  <!-- Subtle dot pattern -->
  <g opacity="0.06" fill="#6b7280">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="320" cy="80" r="2"/><circle cx="400" cy="80" r="2"/><circle cx="480" cy="80" r="2"/>
    <circle cx="560" cy="80" r="2"/><circle cx="640" cy="80" r="2"/><circle cx="720" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="240" cy="160" r="2"/>
    <circle cx="320" cy="160" r="2"/><circle cx="400" cy="160" r="2"/><circle cx="480" cy="160" r="2"/>
    <circle cx="560" cy="160" r="2"/><circle cx="640" cy="160" r="2"/><circle cx="720" cy="160" r="2"/>
    <circle cx="80" cy="240" r="2"/><circle cx="160" cy="240" r="2"/><circle cx="240" cy="240" r="2"/>
    <circle cx="320" cy="240" r="2"/><circle cx="400" cy="240" r="2"/><circle cx="480" cy="240" r="2"/>
    <circle cx="560" cy="240" r="2"/><circle cx="640" cy="240" r="2"/><circle cx="720" cy="240" r="2"/>
    <circle cx="80" cy="320" r="2"/><circle cx="160" cy="320" r="2"/><circle cx="720" cy="320" r="2"/>
    <circle cx="80" cy="400" r="2"/><circle cx="720" cy="400" r="2"/>
  </g>
  <!-- Image placeholder frame -->
  <rect x="200" y="100" width="400" height="290" rx="8" fill="url(#iconFb)" opacity="0.5"/>
  <rect x="200" y="100" width="400" height="290" rx="8" fill="none" stroke="#4b5563" stroke-width="2"/>
  <!-- Camera icon (simplified) -->
  <!-- Camera body -->
  <rect x="290" y="175" width="220" height="160" rx="12" fill="#374151"/>
  <!-- Camera lens outer ring -->
  <circle cx="400" cy="255" r="60" fill="#1f2937" stroke="#4b5563" stroke-width="3"/>
  <!-- Lens inner ring -->
  <circle cx="400" cy="255" r="45" fill="#111827" stroke="#374151" stroke-width="2"/>
  <!-- Lens reflection -->
  <circle cx="400" cy="255" r="35" fill="#0f172a"/>
  <circle cx="384" cy="239" r="10" fill="#1e293b" opacity="0.6"/>
  <circle cx="382" cy="237" r="5" fill="#374151" opacity="0.4"/>
  <!-- Camera viewfinder bump -->
  <rect x="352" y="163" width="60" height="18" rx="8" fill="#374151"/>
  <!-- Camera flash button -->
  <circle cx="470" cy="185" r="8" fill="#4b5563"/>
  <!-- Shreeji Art wordmark below icon -->
  <text x="400" y="430" font-family="Arial,sans-serif" font-size="22" fill="#9ca3af" text-anchor="middle" font-weight="700" letter-spacing="4">SHREEJI ART</text>
  <text x="400" y="458" font-family="Arial,sans-serif" font-size="13" fill="#6b7280" text-anchor="middle" letter-spacing="3">IMAGE NOT AVAILABLE</text>
  <!-- Decorative rule -->
  <line x1="320" y1="410" x2="480" y2="410" stroke="#4b5563" stroke-width="1" opacity="0.5"/>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#1c1c2e" opacity="0.97"/>
  <rect x="0" y="490" width="800" height="1" fill="#4b5563" opacity="0.5"/>
  <text x="400" y="527" font-family="Arial,sans-serif" font-size="15" fill="#6b7280" text-anchor="middle" letter-spacing="3">GALLERY IMAGE PLACEHOLDER</text>
</svg>
