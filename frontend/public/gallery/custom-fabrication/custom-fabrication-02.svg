<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bg22" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0c08"/>
      <stop offset="100%" stop-color="#1a160a"/>
    </linearGradient>
    <linearGradient id="machine22" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="sparks22" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="spark22">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="800" height="550" fill="url(#bg22)"/>
  <!-- Workshop floor -->
  <rect x="0" y="430" width="800" height="60" fill="#1a1610" opacity="0.8"/>
  <line x1="0" y1="430" x2="800" y2="430" stroke="#d4a017" stroke-width="2" opacity="0.3"/>
  <!-- CNC machine body (simplified) -->
  <!-- Main body -->
  <rect x="100" y="200" width="360" height="230" rx="6" fill="url(#machine22)"/>
  <!-- Machine top gantry -->
  <rect x="80" y="170" width="400" height="40" rx="4" fill="#4b5563"/>
  <!-- Gantry rail -->
  <rect x="90" y="182" width="380" height="8" rx="4" fill="#6b7280"/>
  <!-- CNC head/spindle (moves along rail) -->
  <rect x="220" y="165" width="40" height="55" rx="4" fill="#374151"/>
  <rect x="228" y="165" width="8" height="55" fill="#4b5563" opacity="0.5"/>
  <!-- Spindle -->
  <circle cx="240" cy="220" r="12" fill="#1f2937" stroke="#6b7280" stroke-width="2"/>
  <circle cx="240" cy="220" r="6" fill="#9ca3af"/>
  <!-- CNC tip -->
  <polygon points="234,232 246,232 240,250" fill="#d4a017"/>
  <!-- CNC cutting table -->
  <rect x="110" y="248" width="340" height="170" rx="2" fill="#111827"/>
  <!-- Work-piece being cut (gold) -->
  <rect x="140" y="268" width="280" height="100" rx="2" fill="#1a160a" stroke="#d4a017" stroke-width="2"/>
  <!-- CNC cut path on workpiece -->
  <path d="M 160 308 L 200 280 L 240 308 L 280 280 L 320 308 L 360 280 L 380 308" fill="none" stroke="#d4a017" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Cutting sparks effect -->
  <g filter="url(#spark22)">
    <circle cx="240" cy="250" r="8" fill="url(#sparks22)" opacity="0.8"/>
    <circle cx="244" cy="245" r="4" fill="#fbbf24" opacity="0.7"/>
    <circle cx="236" cy="246" r="3" fill="#f59e0b" opacity="0.6"/>
  </g>
  <!-- Spark particles -->
  <g fill="#fbbf24" opacity="0.6">
    <circle cx="252" cy="238" r="2"/><circle cx="228" cy="242" r="1.5"/>
    <circle cx="260" cy="243" r="1.5"/><circle cx="220" cy="248" r="2"/>
    <circle cx="258" cy="235" r="1"/><circle cx="224" cy="237" r="1.5"/>
  </g>
  <!-- Control panel (right side) -->
  <rect x="520" y="180" width="180" height="280" rx="6" fill="url(#machine22)"/>
  <rect x="530" y="195" width="160" height="100" rx="3" fill="#111827"/>
  <!-- Screen content -->
  <text x="610" y="225" font-family="Arial Monospace,monospace" font-size="11" fill="#d4a017" text-anchor="middle">CNC CTRL v2.4</text>
  <line x1="540" y1="234" x2="700" y2="234" stroke="#d4a017" stroke-width="0.5" opacity="0.4"/>
  <text x="542" y="250" font-family="Arial Monospace,monospace" font-size="9" fill="#6ee7b7">X: 240.00 mm</text>
  <text x="542" y="264" font-family="Arial Monospace,monospace" font-size="9" fill="#6ee7b7">Y: 308.00 mm</text>
  <text x="542" y="278" font-family="Arial Monospace,monospace" font-size="9" fill="#6ee7b7">Z: -12.50 mm</text>
  <text x="542" y="290" font-family="Arial Monospace,monospace" font-size="9" fill="#f87171">RPM: 18000</text>
  <!-- Control buttons -->
  <circle cx="550" cy="322" r="12" fill="#10b981" opacity="0.8"/>
  <circle cx="590" cy="322" r="12" fill="#f59e0b" opacity="0.8"/>
  <circle cx="630" cy="322" r="12" fill="#ef4444" opacity="0.8"/>
  <circle cx="670" cy="322" r="12" fill="#6b7280" opacity="0.8"/>
  <!-- Dial knob -->
  <circle cx="610" cy="370" r="24" fill="#374151" stroke="#6b7280" stroke-width="2"/>
  <line x1="610" y1="370" x2="610" y2="350" stroke="#d4a017" stroke-width="3" stroke-linecap="round"/>
  <!-- Ambient warm glow from sparks -->
  <circle cx="240" cy="250" r="40" fill="#fbbf24" opacity="0.03"/>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#0e0c08" opacity="0.97"/>
  <rect x="0" y="490" width="800" height="1" fill="#d4a017" opacity="0.6"/>
  <text x="40" y="527" font-family="Arial,sans-serif" font-size="16" fill="#f0c040" font-weight="600" letter-spacing="2">CNC ROUTING &amp; FABRICATION</text>
  <rect x="680" y="507" width="80" height="24" rx="3" fill="#d4a017" opacity="0.12"/>
  <text x="720" y="524" font-family="Arial,sans-serif" font-size="12" fill="#d4a017" text-anchor="middle" font-weight="600">SAMPLE</text>
</svg>
