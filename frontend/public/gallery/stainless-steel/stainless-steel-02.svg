<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1c2b3a"/>
    </linearGradient>
    <linearGradient id="plaque" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="20%" stop-color="#cbd5e1"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="80%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#dde6ef"/>
    </linearGradient>
    <linearGradient id="plaqueEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="550" fill="url(#bg2)"/>
  <!-- Wall surface texture -->
  <g opacity="0.05" stroke="#6b7280" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>
  <!-- Plaque 3D side (right) -->
  <polygon points="680,155 700,145 700,345 680,355" fill="url(#plaqueEdge)"/>
  <!-- Plaque 3D side (bottom) -->
  <polygon points="120,355 680,355 700,345 140,345" fill="#334155"/>
  <!-- Main plaque face -->
  <rect x="120" y="155" width="560" height="190" rx="3" fill="url(#plaque)"/>
  <!-- Brushed texture lines on plaque -->
  <g opacity="0.12" stroke="#64748b" stroke-width="0.5">
    <line x1="120" y1="175" x2="680" y2="175"/><line x1="120" y1="185" x2="680" y2="185"/>
    <line x1="120" y1="195" x2="680" y2="195"/><line x1="120" y1="205" x2="680" y2="205"/>
    <line x1="120" y1="215" x2="680" y2="215"/><line x1="120" y1="225" x2="680" y2="225"/>
    <line x1="120" y1="235" x2="680" y2="235"/><line x1="120" y1="245" x2="680" y2="245"/>
    <line x1="120" y1="255" x2="680" y2="255"/><line x1="120" y1="265" x2="680" y2="265"/>
    <line x1="120" y1="275" x2="680" y2="275"/><line x1="120" y1="285" x2="680" y2="285"/>
    <line x1="120" y1="295" x2="680" y2="295"/><line x1="120" y1="305" x2="680" y2="305"/>
    <line x1="120" y1="315" x2="680" y2="315"/><line x1="120" y1="325" x2="680" y2="325"/>
    <line x1="120" y1="335" x2="680" y2="335"/>
  </g>
  <!-- Gold accent border on plaque -->
  <rect x="128" y="163" width="544" height="3" fill="#d4a017"/>
  <rect x="128" y="339" width="544" height="3" fill="#d4a017"/>
  <rect x="128" y="163" width="3" height="179" fill="#d4a017"/>
  <rect x="669" y="163" width="3" height="179" fill="#d4a017"/>
  <!-- Company name text engraved -->
  <text x="400" y="265" font-family="Arial,sans-serif" font-size="42" fill="#1e293b" text-anchor="middle" font-weight="700" letter-spacing="6">SHREEJI ART</text>
  <text x="400" y="310" font-family="Arial,sans-serif" font-size="16" fill="#334155" text-anchor="middle" letter-spacing="4">PREMIUM SIGNAGE &amp; BRANDING</text>
  <!-- Mounting screws -->
  <circle cx="145" cy="178" r="7" fill="#475569" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="145" cy="178" r="2.5" fill="#94a3b8"/>
  <circle cx="655" cy="178" r="7" fill="#475569" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="655" cy="178" r="2.5" fill="#94a3b8"/>
  <circle cx="145" cy="328" r="7" fill="#475569" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="145" cy="328" r="2.5" fill="#94a3b8"/>
  <circle cx="655" cy="328" r="7" fill="#475569" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="655" cy="328" r="2.5" fill="#94a3b8"/>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#0d1520" opacity="0.95"/>
  <rect x="0" y="490" width="800" height="1" fill="#d4a017" opacity="0.6"/>
  <text x="40" y="527" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" font-weight="600" letter-spacing="2">STAINLESS STEEL NAMEPLATE</text>
  <rect x="680" y="507" width="80" height="24" rx="3" fill="#d4a017" opacity="0.15"/>
  <text x="720" y="524" font-family="Arial,sans-serif" font-size="12" fill="#d4a017" text-anchor="middle" font-weight="600">SAMPLE</text>
</svg>
