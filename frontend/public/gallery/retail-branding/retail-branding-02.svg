<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bg16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#180c06"/>
      <stop offset="100%" stop-color="#221006"/>
    </linearGradient>
    <linearGradient id="wall16" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14100c"/>
      <stop offset="100%" stop-color="#0c0c0a"/>
    </linearGradient>
    <linearGradient id="blade16" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="bladeSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#78200a"/>
      <stop offset="100%" stop-color="#450e04"/>
    </linearGradient>
    <filter id="glow16">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>
  <rect width="800" height="550" fill="url(#bg16)"/>
  <!-- Building wall -->
  <rect x="0" y="0" width="400" height="550" fill="url(#wall16)" opacity="0.8"/>
  <!-- Wall panel lines -->
  <g opacity="0.1" stroke="#f97316" stroke-width="0.5">
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/><line x1="0" y1="400" x2="400" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="550"/><line x1="200" y1="0" x2="200" y2="550"/>
    <line x1="300" y1="0" x2="300" y2="550"/>
  </g>
  <!-- Blade sign mounting bracket on wall -->
  <rect x="290" y="160" width="30" height="20" rx="3" fill="#4b2d0a" stroke="#f97316" stroke-width="1.5"/>
  <rect x="290" y="320" width="30" height="20" rx="3" fill="#4b2d0a" stroke="#f97316" stroke-width="1.5"/>
  <!-- Blade sign arm -->
  <rect x="316" y="168" width="40" height="8" rx="4" fill="#78350f"/>
  <rect x="316" y="324" width="40" height="8" rx="4" fill="#78350f"/>
  <!-- Blade sign 3D bottom face -->
  <polygon points="356,332 750,332 766,348 372,348" fill="url(#bladeSide)"/>
  <!-- Blade sign 3D right face -->
  <polygon points="750,168 766,152 766,348 750,332" fill="#6b1a06"/>
  <!-- Blade sign face (main) -->
  <rect x="356" y="168" width="394" height="164" rx="2" fill="url(#blade16)"/>
  <!-- Sign border -->
  <rect x="356" y="168" width="394" height="164" rx="2" fill="none" stroke="#fbbf24" stroke-width="2" filter="url(#glow16)" opacity="0.5"/>
  <!-- Sign text -->
  <text x="553" y="246" font-family="Arial,sans-serif" font-size="38" fill="#fff7ed" text-anchor="middle" font-weight="900" letter-spacing="2">SHREEJI</text>
  <text x="553" y="290" font-family="Arial,sans-serif" font-size="38" fill="#fff7ed" text-anchor="middle" font-weight="900" letter-spacing="2">ART</text>
  <!-- Arrow decoration on sign -->
  <polygon points="760,250 780,265 760,280" fill="#fbbf24" opacity="0.7"/>
  <!-- Street lamp suggestion -->
  <line x1="680" y1="350" x2="680" y2="550" stroke="#374151" stroke-width="6"/>
  <ellipse cx="680" cy="350" rx="30" ry="8" fill="#374151"/>
  <ellipse cx="680" cy="345" rx="25" ry="6" fill="#fbbf24" opacity="0.2"/>
  <!-- Ground glow -->
  <ellipse cx="500" cy="490" rx="220" ry="25" fill="#ea580c" opacity="0.05"/>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#180c06" opacity="0.97"/>
  <rect x="0" y="490" width="800" height="1" fill="#f97316" opacity="0.5"/>
  <text x="40" y="527" font-family="Arial,sans-serif" font-size="16" fill="#fb923c" font-weight="600" letter-spacing="2">PROJECTING BLADE SIGN</text>
  <rect x="680" y="507" width="80" height="24" rx="3" fill="#f97316" opacity="0.12"/>
  <text x="720" y="524" font-family="Arial,sans-serif" font-size="12" fill="#f97316" text-anchor="middle" font-weight="600">SAMPLE</text>
</svg>
