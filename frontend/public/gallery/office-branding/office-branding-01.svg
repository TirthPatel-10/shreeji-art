<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="wall13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="panel13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow13">
      <feDropShadow dx="4" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="550" fill="url(#bg13)"/>
  <!-- Reception wall surface -->
  <rect x="60" y="60" width="680" height="390" rx="3" fill="url(#wall13)"/>
  <!-- Subtle wall panel lines (wainscoting) -->
  <rect x="60" y="310" width="680" height="140" fill="#e2e8f0" opacity="0.6"/>
  <line x1="60" y1="310" x2="740" y2="310" stroke="#cbd5e1" stroke-width="2"/>
  <!-- Vertical panel dividers -->
  <line x1="200" y1="60" x2="200" y2="310" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="600" y1="60" x2="600" y2="310" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Company sign panel mounted on wall -->
  <rect x="160" y="155" width="480" height="150" rx="4" fill="url(#panel13)" filter="url(#shadow13)"/>
  <!-- Gold top accent line on sign -->
  <rect x="160" y="155" width="480" height="5" rx="2" fill="#d4a017"/>
  <!-- Gold bottom accent line -->
  <rect x="160" y="300" width="480" height="5" rx="2" fill="#d4a017"/>
  <!-- White company name on dark sign panel -->
  <text x="400" y="225" font-family="Arial,sans-serif" font-size="38" fill="#f8fafc" text-anchor="middle" font-weight="700" letter-spacing="5">SHREEJI ART</text>
  <text x="400" y="268" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="4">SIGNAGE &amp; BRANDING SOLUTIONS</text>
  <!-- Decorative gold horizontal rule in sign -->
  <line x1="240" y1="244" x2="560" y2="244" stroke="#d4a017" stroke-width="1" opacity="0.5"/>
  <!-- Standoff screws -->
  <circle cx="185" cy="178" r="7" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <circle cx="185" cy="178" r="2.5" fill="#94a3b8"/>
  <circle cx="615" cy="178" r="7" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <circle cx="615" cy="178" r="2.5" fill="#94a3b8"/>
  <circle cx="185" cy="278" r="7" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <circle cx="185" cy="278" r="2.5" fill="#94a3b8"/>
  <circle cx="615" cy="278" r="7" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <circle cx="615" cy="278" r="2.5" fill="#94a3b8"/>
  <!-- Potted plant suggestion (left) -->
  <rect x="80" y="340" width="40" height="60" rx="4" fill="#94a3b8" opacity="0.3"/>
  <ellipse cx="100" cy="338" rx="28" ry="20" fill="#059669" opacity="0.25"/>
  <ellipse cx="100" cy="328" rx="20" ry="16" fill="#10b981" opacity="0.2"/>
  <!-- Sofa/reception desk suggestion (right) -->
  <rect x="580" y="340" width="140" height="50" rx="8" fill="#cbd5e1" opacity="0.5"/>
  <rect x="580" y="360" width="140" height="10" rx="0" fill="#94a3b8" opacity="0.3"/>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#0f172a" opacity="0.97"/>
  <rect x="0" y="490" width="800" height="1" fill="#d4a017" opacity="0.6"/>
  <text x="40" y="527" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" font-weight="600" letter-spacing="2">OFFICE RECEPTION BRANDING</text>
  <rect x="680" y="507" width="80" height="24" rx="3" fill="#d4a017" opacity="0.15"/>
  <text x="720" y="524" font-family="Arial,sans-serif" font-size="12" fill="#d4a017" text-anchor="middle" font-weight="600">SAMPLE</text>
</svg>
