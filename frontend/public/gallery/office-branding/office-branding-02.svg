<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#e8edf4"/>
    </linearGradient>
    <linearGradient id="doorFrame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="doorGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="shadow14">
      <feDropShadow dx="3" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="550" fill="url(#bg14)"/>
  <!-- Office corridor wall -->
  <rect x="60" y="60" width="680" height="400" fill="#f8fafc"/>
  <!-- Floor tile pattern -->
  <rect x="60" y="420" width="680" height="40" fill="#e2e8f0"/>
  <line x1="60" y1="420" x2="740" y2="420" stroke="#cbd5e1" stroke-width="2"/>
  <!-- Door frame left -->
  <rect x="200" y="100" width="18" height="360" rx="2" fill="url(#doorFrame)"/>
  <!-- Door frame right -->
  <rect x="580" y="100" width="18" height="360" rx="2" fill="url(#doorFrame)"/>
  <!-- Door frame top -->
  <rect x="200" y="100" width="398" height="18" rx="2" fill="url(#doorFrame)"/>
  <!-- Glass door panel -->
  <rect x="218" y="118" width="362" height="342" rx="1" fill="url(#doorGlass)"/>
  <!-- Glass reflection lines -->
  <line x1="250" y1="118" x2="250" y2="460" stroke="#ffffff" stroke-width="8" opacity="0.15"/>
  <line x1="310" y1="118" x2="270" y2="460" stroke="#ffffff" stroke-width="3" opacity="0.08"/>
  <!-- Door handle -->
  <rect x="382" y="280" width="36" height="8" rx="4" fill="#94a3b8"/>
  <circle cx="382" cy="284" r="5" fill="#64748b"/>
  <!-- Office name plate mounted beside door (right side) -->
  <rect x="612" y="200" width="100" height="130" rx="3" fill="#0f172a" filter="url(#shadow14)"/>
  <rect x="612" y="200" width="100" height="4" fill="#d4a017"/>
  <rect x="612" y="326" width="100" height="4" fill="#d4a017"/>
  <!-- Text on name plate (rotated to read naturally) -->
  <text x="662" y="248" font-family="Arial,sans-serif" font-size="11" fill="#f8fafc" text-anchor="middle" font-weight="700" letter-spacing="1">SHREEJI</text>
  <text x="662" y="266" font-family="Arial,sans-serif" font-size="11" fill="#f8fafc" text-anchor="middle" font-weight="700" letter-spacing="1">ART</text>
  <line x1="630" y1="278" x2="694" y2="278" stroke="#d4a017" stroke-width="1" opacity="0.5"/>
  <text x="662" y="296" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" letter-spacing="1">DESIGN</text>
  <text x="662" y="311" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" letter-spacing="1">STUDIO</text>
  <!-- Ceiling light suggestion -->
  <rect x="340" y="60" width="120" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="340" y="68" width="120" height="3" fill="#fbbf24" opacity="0.4"/>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#0f172a" opacity="0.97"/>
  <rect x="0" y="490" width="800" height="1" fill="#d4a017" opacity="0.6"/>
  <text x="40" y="527" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" font-weight="600" letter-spacing="2">OFFICE DOOR SIGNAGE</text>
  <rect x="680" y="507" width="80" height="24" rx="3" fill="#d4a017" opacity="0.15"/>
  <text x="720" y="524" font-family="Arial,sans-serif" font-size="12" fill="#d4a017" text-anchor="middle" font-weight="600">SAMPLE</text>
</svg>
