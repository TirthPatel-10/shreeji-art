<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" width="800" height="550">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18120a"/>
      <stop offset="100%" stop-color="#251a06"/>
    </linearGradient>
    <radialGradient id="ledGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <filter id="ledBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="800" height="550" fill="url(#bg9)"/>
  <!-- Ambient glow -->
  <ellipse cx="400" cy="265" rx="320" ry="220" fill="url(#ledGlow)"/>
  <!-- Channel letter S - path (simplified S shape using rectangles) -->
  <!-- Top bar -->
  <rect x="160" y="120" width="200" height="45" rx="22" fill="#fbbf24" filter="url(#ledBlur)" opacity="0.4"/>
  <rect x="160" y="120" width="200" height="45" rx="22" fill="#fcd34d"/>
  <!-- Top-left vertical -->
  <rect x="160" y="120" width="45" height="130" rx="22" fill="#fbbf24" filter="url(#ledBlur)" opacity="0.4"/>
  <rect x="160" y="120" width="45" height="130" rx="22" fill="#fcd34d"/>
  <!-- Middle bar -->
  <rect x="160" y="232" width="200" height="45" rx="22" fill="#fbbf24" filter="url(#ledBlur)" opacity="0.4"/>
  <rect x="160" y="232" width="200" height="45" rx="22" fill="#fcd34d"/>
  <!-- Bottom-right vertical -->
  <rect x="315" y="232" width="45" height="130" rx="22" fill="#fbbf24" filter="url(#ledBlur)" opacity="0.4"/>
  <rect x="315" y="232" width="45" height="130" rx="22" fill="#fcd34d"/>
  <!-- Bottom bar -->
  <rect x="160" y="317" width="200" height="45" rx="22" fill="#fbbf24" filter="url(#ledBlur)" opacity="0.4"/>
  <rect x="160" y="317" width="200" height="45" rx="22" fill="#fcd34d"/>
  <!-- LED dot pattern overlaid on letter S -->
  <g fill="#fff8d6" opacity="0.35">
    <circle cx="185" cy="142" r="4"/><circle cx="210" cy="142" r="4"/><circle cx="235" cy="142" r="4"/>
    <circle cx="260" cy="142" r="4"/><circle cx="285" cy="142" r="4"/><circle cx="310" cy="142" r="4"/>
    <circle cx="340" cy="142" r="4"/>
    <circle cx="185" cy="175" r="4"/><circle cx="185" cy="208" r="4"/>
    <circle cx="185" cy="255" r="4"/><circle cx="210" cy="255" r="4"/><circle cx="235" cy="255" r="4"/>
    <circle cx="260" cy="255" r="4"/><circle cx="285" cy="255" r="4"/><circle cx="310" cy="255" r="4"/>
    <circle cx="340" cy="255" r="4"/>
    <circle cx="340" cy="288" r="4"/><circle cx="340" cy="322" r="4"/>
    <circle cx="185" cy="340" r="4"/><circle cx="210" cy="340" r="4"/><circle cx="235" cy="340" r="4"/>
    <circle cx="260" cy="340" r="4"/><circle cx="285" cy="340" r="4"/><circle cx="310" cy="340" r="4"/>
    <circle cx="340" cy="340" r="4"/>
  </g>
  <!-- LED text to the right -->
  <text x="520" y="230" font-family="Arial,sans-serif" font-size="52" fill="#fcd34d" text-anchor="middle" font-weight="900" letter-spacing="1" filter="url(#ledBlur)" opacity="0.5">LED</text>
  <text x="520" y="230" font-family="Arial,sans-serif" font-size="52" fill="#fcd34d" text-anchor="middle" font-weight="900" letter-spacing="1">LED</text>
  <text x="520" y="280" font-family="Arial,sans-serif" font-size="20" fill="#fbbf24" text-anchor="middle" letter-spacing="3">CHANNEL</text>
  <text x="520" y="312" font-family="Arial,sans-serif" font-size="20" fill="#fbbf24" text-anchor="middle" letter-spacing="3">LETTERS</text>
  <!-- Vertical separator -->
  <line x1="430" y1="130" x2="430" y2="360" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  <!-- Label bar -->
  <rect x="0" y="490" width="800" height="60" fill="#18120a" opacity="0.97"/>
  <rect x="0" y="490" width="800" height="1" fill="#fbbf24" opacity="0.5"/>
  <text x="40" y="527" font-family="Arial,sans-serif" font-size="16" fill="#fcd34d" font-weight="600" letter-spacing="2">LED CHANNEL LETTERS</text>
  <rect x="680" y="507" width="80" height="24" rx="3" fill="#fbbf24" opacity="0.12"/>
  <text x="720" y="524" font-family="Arial,sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="600">SAMPLE</text>
</svg>
